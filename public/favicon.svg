<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <rect width="512" height="512" rx="140" fill="#242423" />
  <!-- Elegant geometric gold and silver lines -->
  <g transform="translate(64, 64) scale(0.75)">
    <!-- Shield / Diamond shape outline -->
    <path d="M256 40 L450 150 L450 362 L256 472 L62 362 L62 150 Z" fill="none" stroke="#f5cb5c" stroke-width="20" stroke-linejoin="round" />
    
    <!-- Gold Monogram D on the left side of the shield -->
    <path d="M180 180 V340 C180 340 270 340 270 260 C270 180 180 180 180 180 Z" fill="none" stroke="#f5cb5c" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Silver Monogram W intersecting the D on the right -->
    <path d="M230 260 L285 340 L340 260 L395 340" fill="none" stroke="#cfdbd5" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
