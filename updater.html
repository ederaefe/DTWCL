<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>DTW Consult — Admin Updater Portal</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gravitas+One&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="favicon.svg?v=2">
  <link rel="apple-touch-icon" href="favicon.svg?v=2">
  <link rel="stylesheet" href="style.css">

  <style>
    :root {
      --font-outfit: 'Outfit', sans-serif;
    }
    body {
      background: radial-gradient(circle at 50% 50%, rgba(21, 23, 26, 0.98) 0%, #090a0b 100%);
      color: #f7fafc;
      font-family: var(--font-outfit);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      overflow-x: hidden;
    }

    /* Passcode Gate Screen */
    .gate-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 50%, #15171a 0%, #090a0b 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .gate-screen.unlocked {
      opacity: 0;
      pointer-events: none;
      transform: scale(1.05);
    }
    .gate-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 24px;
      padding: 3.5rem 2.5rem;
      width: 90%;
      max-width: 440px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
    }
    .gate-logo {
      width: 80px;
      height: 80px;
      margin-bottom: 1.5rem;
      filter: drop-shadow(0 4px 12px rgba(219, 154, 2, 0.3));
    }
    .gate-card h1 {
      font-family: 'Gravitas One', cursive;
      font-size: 1.75rem;
      color: #fff;
      margin-bottom: 0.5rem;
      letter-spacing: 0.5px;
    }
    .gate-card p {
      color: #a0aec0;
      font-size: 0.95rem;
      margin-bottom: 2.5rem;
    }

    /* Admin Workspace (Split Screen) */
    .admin-workspace {
      opacity: 0;
      transform: scale(0.95);
      transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s, transform 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s;
      width: 95%;
      max-width: 1200px;
      margin: 2rem auto;
      display: none;
      grid-template-columns: 1fr;
      gap: 2rem;
    }
    .admin-workspace.visible {
      display: grid;
      opacity: 1;
      transform: scale(1);
    }
    @media (min-width: 992px) {
      .admin-workspace {
        grid-template-columns: 1.1fr 0.9fr;
      }
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    }
    .panel-header {
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding-bottom: 1.25rem;
      margin-bottom: 2rem;
    }
    .panel-header h2 {
      font-size: 1.35rem;
      font-weight: 700;
      color: #fff;
      margin: 0;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .panel-header h2 span {
      color: var(--color-gold);
    }

    /* Premium Form Styling */
    .form-group {
      margin-bottom: 1.75rem;
    }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #a0aec0;
      margin-bottom: 0.6rem;
    }
    .form-control-dark {
      width: 100%;
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 0.9rem 1.1rem;
      color: #fff;
      font-family: var(--font-outfit);
      font-size: 0.95rem;
      transition: all var(--transition-fast);
    }
    .form-control-dark:focus {
      outline: none;
      border-color: var(--color-gold);
      box-shadow: 0 0 0 3px rgba(219, 154, 2, 0.15);
      background: rgba(0, 0, 0, 0.35);
    }
    textarea.form-control-dark {
      resize: none;
    }

    /* Live Preview Section */
    .preview-container {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }
    .preview-sticky {
      position: sticky;
      top: 2rem;
    }
    .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .preview-badge {
      font-size: 0.75rem;
      background: rgba(219, 154, 2, 0.1);
      color: var(--color-gold);
      padding: 0.35rem 0.75rem;
      border-radius: 20px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      border: 1px solid rgba(219, 154, 2, 0.2);
    }

    /* Action Buttons */
    .btn-gold {
      background: var(--color-gold);
      color: #090a0b;
      font-family: var(--font-outfit);
      font-weight: 700;
      font-size: 1rem;
      padding: 1rem 2rem;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: all var(--transition-fast);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      width: 100%;
    }
    .btn-gold:hover:not(:disabled) {
      background: #f0b429;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(219, 154, 2, 0.35);
    }
    .btn-gold:active:not(:disabled) {
      transform: translateY(0);
    }
    .btn-gold:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Status Notifications */
    .status-banner {
      padding: 1rem 1.25rem;
      border-radius: 12px;
      margin-top: 1.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.5;
      display: none;
    }
    .status-banner.success {
      background: rgba(56, 161, 105, 0.15);
      border: 1px solid rgba(56, 161, 105, 0.3);
      color: #48bb78;
      display: block;
    }
    .status-banner.error {
      background: rgba(229, 62, 98, 0.15);
      border: 1px solid rgba(229, 62, 98, 0.3);
      color: #f56565;
      display: block;
    }
  </style>
</head>
<body>

  <!-- 1. Passcode Gate Screen -->
  <div class="gate-screen" id="gate-screen">
    <div class="gate-card">
      <img src="assets/logo.svg?v=2" alt="DTW Logo" class="gate-logo">
      <h1>DTW CONSULT</h1>
      <p>Enter the administrator pin to publish announcements.</p>
      
      <form id="gate-form">
        <div class="form-group" style="margin-bottom: 1.5rem;">
          <input type="password" id="gate-passcode" class="form-control-dark" required placeholder="••••" style="text-align: center; letter-spacing: 8px; font-size: 1.5rem;" maxlength="4">
        </div>
        <button type="submit" class="btn-gold" style="padding: 0.8rem 1.5rem; font-size: 0.95rem;">Unlock Portal</button>
        <div id="gate-error" style="color: #f56565; font-size: 0.85rem; font-weight: 600; margin-top: 1rem; display: none;">Invalid passcode. Access denied.</div>
      </form>
    </div>
  </div>

  <!-- 2. Admin Workspace -->
  <div class="admin-workspace" id="admin-workspace">
    
    <!-- Left Column: Input Panel -->
    <div class="glass-panel">
      <div class="panel-header">
        <h2><span>Publish</span> News & Updates</h2>
      </div>

      <form id="updater-form">
        <div class="form-group">
          <label for="image">Google Drive Share Link (Optional Image)</label>
          <input type="url" id="image" class="form-control-dark" placeholder="https://drive.google.com/file/d/...">
        </div>

        <div class="form-group">
          <label for="text">Announcement Body *</label>
          <textarea id="text" rows="6" required class="form-control-dark" placeholder="Write details about new exam dates, bootcamps, classes, or announcements..."></textarea>
        </div>

        <div class="form-group">
          <label for="link">Call to Action URL (Optional)</label>
          <input type="url" id="link" class="form-control-dark" placeholder="https://example.com/apply-now">
        </div>

        <button type="submit" class="btn-gold" id="submit-btn">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"></path>
          </svg>
          Publish Update
        </button>

        <div id="status-banner" class="status-banner"></div>
      </form>
    </div>

    <!-- Right Column: Live Interactive Preview -->
    <div class="preview-container">
      <div class="preview-sticky">
        <div class="preview-header">
          <h3 style="font-size: 1.1rem; font-weight: 700; color: #fff; margin: 0;">Live Live Feed Preview</h3>
          <span class="preview-badge">Updates Page Rendering</span>
        </div>

        <!-- Simulated updates feed rendering -->
        <div class="updates-feed" style="padding: 0; max-width: 100%;">
          <article class="update-card" style="box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
            <img id="preview-card-img" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 3 2' fill='%231a1e22'%3E%3Crect width='3' height='2'/%3E%3C/svg%3E" alt="Preview Image" class="update-image" style="display: none;">
            <div class="update-content" style="background: #111315; border-top: 1px solid rgba(255,255,255,0.03);">
              <span class="update-date" id="preview-card-date">July 16, 2026</span>
              <p class="update-text" id="preview-card-text" style="color: #cbd5e0; min-height: 4.5rem;">Draft announcement preview text will generate here in real time...</p>
              <a href="#" id="preview-card-link" target="_blank" class="update-link" style="display: none;">
                Read More 
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
              </a>
            </div>
          </article>
        </div>
      </div>
    </div>

  </div>

  <script>
    let unlockedPasscode = '';

    // Passcode Validation Logic (Client Side Unlock Gate)
    document.getElementById('gate-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const code = document.getElementById('gate-passcode').value;
      const errorDiv = document.getElementById('gate-error');
      
      // Pin code 7830 verifies gate access
      if (code === '7830') {
        unlockedPasscode = code;
        errorDiv.style.display = 'none';
        
        // Premium transition exit
        const gate = document.getElementById('gate-screen');
        const workspace = document.getElementById('admin-workspace');
        
        gate.classList.add('unlocked');
        workspace.classList.add('visible');
      } else {
        errorDiv.style.display = 'block';
        document.getElementById('gate-passcode').value = '';
      }
    });

    // Helper for direct Google Drive image display
    function getDirectImageUrl(url) {
      if (!url) return '';
      const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
      if (match && match[1]) {
        return `https://drive.google.com/uc?export=view&id=${match[1]}`;
      }
      return url;
    }

    // Format current date
    function formatDate(date) {
      const options = { year: 'numeric', month: 'long', day: 'numeric' };
      return date.toLocaleDateString('en-US', options);
    }

    // Real-Time Live Preview Synchronization
    const imageInput = document.getElementById('image');
    const textInput = document.getElementById('text');
    const linkInput = document.getElementById('link');

    const previewImg = document.getElementById('preview-card-img');
    const previewDate = document.getElementById('preview-card-date');
    const previewText = document.getElementById('preview-card-text');
    const previewLink = document.getElementById('preview-card-link');

    // Set today's date initially
    previewDate.textContent = formatDate(new Date());

    function updatePreview() {
      // Image preview sync
      const rawImg = imageInput.value.trim();
      if (rawImg) {
        previewImg.src = getDirectImageUrl(rawImg);
        previewImg.style.display = 'block';
      } else {
        previewImg.style.display = 'none';
      }

      // Text preview sync
      const rawText = textInput.value;
      if (rawText.trim()) {
        previewText.innerHTML = rawText.replace(/\n/g, '<br>');
      } else {
        previewText.innerHTML = 'Draft announcement preview text will generate here in real time...';
      }

      // Link preview sync
      const rawLink = linkInput.value.trim();
      if (rawLink) {
        previewLink.style.display = 'inline-flex';
      } else {
        previewLink.style.display = 'none';
      }
    }

    imageInput.addEventListener('input', updatePreview);
    textInput.addEventListener('input', updatePreview);
    linkInput.addEventListener('input', updatePreview);

    // Form Submission to serverless api endpoint
    document.getElementById('updater-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const banner = document.getElementById('status-banner');
      
      const payload = {
        passcode: unlockedPasscode,
        image: imageInput.value.trim(),
        text: textInput.value,
        link: linkInput.value.trim()
      };

      btn.disabled = true;
      btn.innerHTML = 'Publishing Announcement...';
      banner.style.display = 'none';
      banner.className = 'status-banner';

      try {
        const response = await fetch('/api/add-update', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (response.ok) {
          banner.textContent = 'Announcement successfully published! Vercel is deploying it now. Check the updates feed in 1-2 minutes.';
          banner.classList.add('success');
          document.getElementById('updater-form').reset();
          updatePreview();
        } else {
          banner.textContent = result.error || 'Failed to publish announcement. Verify environment variables.';
          banner.classList.add('error');
        }
      } catch (err) {
        banner.textContent = 'API network failure. Verify Vercel deployment logs.';
        banner.classList.add('error');
      } finally {
        banner.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = `
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"></path>
          </svg>
          Publish Update
        `;
      }
    });
  </script>
</body>
</html>
