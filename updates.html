<script>
  if (!window.__SPA_ROUTER__) {
    window.location.replace('/?page=updates');
  }
</script>
<title>DTW Consult — Updates &amp; News</title>

  <main>
    <section class="page-header" style="background: var(--bg-soft); padding: 8rem 0 4rem; text-align: center;">
      <div class="container">
        <span class="section-label">Announcements</span>
        <h1 style="font-size: clamp(2rem, 5vw, 3rem); font-family: 'Gravitas One', cursive; font-weight: 400; margin-bottom: 1rem; color: var(--color-onyx);">
          Latest Updates
        </h1>
        <p style="color: var(--text-muted); max-width: 600px; margin: 0 auto;">
          Stay informed on our newest academic programs, upcoming events, and strategic advisories.
        </p>
      </div>
    </section>

    <section style="background-color: var(--color-ash);">
      <div class="container" id="updates-container" class="updates-feed">
        <!-- Skeleton loaders while fetching -->
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>
    </section>
  </main>

  <script>
    // Utility to convert standard google drive link to direct image link
    function getDirectImageUrl(url) {
      if (!url) return '';
      // Extract the ID from the share link
      const match = url.match(/\\/d\\/([a-zA-Z0-9_-]+)/);
      if (match && match[1]) {
        return `https://drive.google.com/uc?export=view&id=${match[1]}`;
      }
      return url; // fallback
    }

    // Format ISO date
    function formatDate(isoString) {
      const options = { year: 'numeric', month: 'long', day: 'numeric' };
      return new Date(isoString).toLocaleDateString('en-US', options);
    }

    // Fetch and render updates
    async function loadUpdates() {
      const container = document.getElementById('updates-container');
      try {
        // Appending timestamp to prevent aggressive caching
        const res = await fetch('data/updates.json?t=' + new Date().getTime());
        if (!res.ok) throw new Error("Could not load updates");
        const updates = await res.json();
        
        container.innerHTML = '';
        container.className = 'updates-feed'; // Assign grid class
        
        if (updates.length === 0) {
          container.innerHTML = '<p style="text-align: center; color: var(--text-muted); padding: 4rem;">No updates at the moment. Check back soon!</p>';
          return;
        }

        updates.forEach(item => {
          const card = document.createElement('article');
          card.className = 'update-card animate fade-up';
          
          let imgHtml = '';
          if (item.image) {
            const directImg = getDirectImageUrl(item.image);
            imgHtml = `<img src="${directImg}" alt="Update Image" class="update-image" loading="lazy">`;
          }

          let linkHtml = '';
          if (item.link) {
            linkHtml = `
              <a href="${item.link}" target="_blank" rel="noopener" class="update-link">
                Read More 
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
              </a>
            `;
          }

          card.innerHTML = `
            ${imgHtml}
            <div class="update-content">
              <span class="update-date">${formatDate(item.date)}</span>
              <p class="update-text">${item.text.replace(/\\n/g, '<br>')}</p>
              ${linkHtml}
            </div>
          `;
          container.appendChild(card);
        });

        // Trigger the scroll observer for the newly added elements
        if (typeof initScrollEffects === 'function') {
          setTimeout(initScrollEffects, 100);
        }

      } catch (err) {
        console.error(err);
        container.innerHTML = '<p style="text-align: center; color: #e53e3e; padding: 4rem;">Unable to load updates at this time.</p>';
      }
    }

    loadUpdates();
  </script>
